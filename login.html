<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>دخول</title>
<style>
body{font-family:Arial;direction:rtl;background:#f2f2f2;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#fff;padding:20px;width:300px;text-align:center}
input{width:90%;padding:10px;margin:5px}
button{width:100%;padding:10px;background:#0d47a1;color:#fff;border:none}
</style>
</head>
<body>

<div class="box">
<h3>تسجيل / دخول</h3>
<input id="u" placeholder="اسم المستخدم">
<input id="p" type="password" placeholder="كلمة المرور">

<button onclick="register()">تسجيل</button>
<button onclick="login()">دخول</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")||"{}");

function register(){
let u=u=document.getElementById("u").value;
let p=document.getElementById("p").value;
if(!u||!p)return alert("املأ البيانات");

if(!users[u]){
users[u]={pass:p,balance:0,transactions:[]};
localStorage.setItem("users",JSON.stringify(users));
alert("تم التسجيل");
}else alert("موجود");
}

function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(u==="admin" && p==="admin"){
localStorage.setItem("isAdmin","true");
location="admin.html";
return;
}

if(users[u] && users[u].pass===p){
localStorage.setItem("currentUser",u);
location="dashboard.html";
}else alert("خطأ");
}
</script>

</body>
</html>
