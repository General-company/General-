<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body{
  font-family:Arial;
  direction:rtl;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:white;
  padding:30px;
  width:300px;
  text-align:center;
  border-radius:10px;
}
input{width:90%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#0d47a1;color:white;border:none;}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل الدخول</h2>

<input id="user" placeholder="اسم المستخدم">
<input id="pass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>
</div>

<script>
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u && p){
    localStorage.setItem("loggedIn","true");
    window.location.href="dashboard.html";
  } else {
    alert("املأ البيانات");
  }
}
</script>

</body>
</html>
