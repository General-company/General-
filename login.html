<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - جنرال</title>

  <style>
    body {
      font-family: Arial;
      direction: rtl;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #aaa;
      width: 300px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0d47a1;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1565c0;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #0d47a1;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>تسجيل الدخول</h2>

  <input id="user" type="text" placeholder="اسم المستخدم">
  <input id="pass" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>

  <a href="index.html">العودة للرئيسية</a>
</div>

<script>
function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user !== "" && pass !== "") {
    window.location.href = "dashboard.html";
  } else {
    alert("رجاءً املأ البيانات");
  }
}
</script>

</body>
</html>
