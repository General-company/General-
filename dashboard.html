<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة المستثمر</title>
<style>
body{font-family:Arial;direction:rtl;background:#f4f6f8;text-align:center;margin:0}
header{background:#0d47a1;color:#fff;padding:20px}
.card{background:#fff;width:200px;display:inline-block;margin:10px;padding:15px}
a{display:inline-block;margin:10px;padding:10px;background:#1e88e5;color:#fff;text-decoration:none}
</style>
</head>

<body>

<script>
let user=localStorage.getItem("currentUser");
if(!user)location="login.html";

let users=JSON.parse(localStorage.getItem("users"));
function u(){return users[user];}
function save(){localStorage.setItem("users",JSON.stringify(users));}
</script>

<header>
<h2>لوحة المستثمر</h2>
</header>

<div class="card">
<h3>الرصيد</h3>
<p id="b"></p>
</div>

<br>

<a href="deposit.html">إيداع</a>
<a href="withdraw.html">سحب</a>
<a href="projects.html">استثمار</a>
<a href="#" onclick="logout()">خروج</a>

<script>
function logout(){
localStorage.removeItem("currentUser");
location="login.html";
}

function render(){
document.getElementById("b").innerText=u().balance+" $";
}
render();
</script>

</body>
</html>
