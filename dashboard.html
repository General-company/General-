<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة المستثمر - جنرال</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      direction: rtl;
      background: #f4f6f8;
    }

    header {
      background: #0d47a1;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #1565c0;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      text-align: center;
    }

    .card {
      background: white;
      display: inline-block;
      width: 200px;
      margin: 10px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      background: #0d47a1;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      font-size: 14px;
    }

    button:hover {
      background: #1565c0;
    }

    .actions a {
      display: inline-block;
      margin: 10px;
      padding: 10px 15px;
      background: #1e88e5;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<script>
  // حماية الدخول
  let loggedIn = localStorage.getItem("loggedIn");

  if (!loggedIn) {
    window.location.href = "login.html";
  }

  function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
  }
</script>

<header>
  <h1>لوحة المستثمر</h1>
  <p>شركة جنرال للاستثمار العقاري</p>
</header>

<nav>
  <a href="index.html">الرئيسية</a>
  <a href="#" onclick="logout()">تسجيل خروج</a>
</nav>

<div class="container">

  <h2>نظرة عامة</h2>

  <div class="card">
    <h3>الرصيد</h3>
    <p>0 $</p>
  </div>

  <div class="card">
    <h3>الأرباح</h3>
    <p>0 $</p>
  </div>

  <div class="card">
    <h3>الاستثمارات</h3>
    <p>0</p>
  </div>

  <h2>الإجراءات</h2>

  <div class="actions">
    <a href="deposit.html">💰 إيداع</a>
    <a href="withdraw.html">💸 سحب</a>
  </div>

</div>

</body>
</html>
