<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body>

<script>
if(localStorage.getItem("isAdmin")!=="true")location="login.html";

let users=JSON.parse(localStorage.getItem("users"));

function add(u){
users[u].balance+=10;
localStorage.setItem("users",JSON.stringify(users));
render();
}

function render(){
let html="";
for(let u in users){
html+=`<div>
${u} - ${users[u].balance}
<button onclick="add('${u}')">+10</button>
</div>`;
}
document.body.innerHTML=html;
}

render();
</script>

</body>
</html>
