<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المشاريع</title>

<style>
body{font-family:Arial;direction:rtl;background:#f4f6f8;text-align:center;}
.project{background:white;width:300px;display:inline-block;margin:10px;padding:20px;border-radius:10px;}
input{width:90%;padding:8px;}
button{width:100%;padding:10px;background:#0d47a1;color:white;border:none;margin-top:10px;}
</style>
</head>

<body>

<h2>المشاريع</h2>

<div class="project">
<h3>مشروع دبي</h3>
<input id="p1">
<button onclick="inv('p1')">استثمار</button>
</div>

<div class="project">
<h3>مشروع لندن</h3>
<input id="p2">
<button onclick="inv('p2')">استثمار</button>
</div>

<script>
function inv(id){
let a=Number(document.getElementById(id).value);
let b=Number(localStorage.getItem("balance"))||0;

if(a>b){alert("لا يوجد رصيد");return;}

b-=a;
localStorage.setItem("balance",b);

let t=JSON.parse(localStorage.getItem("transactions"))||[];
t.push("استثمار - "+a);
localStorage.setItem("transactions",JSON.stringify(t));

window.location.href="dashboard.html";
}
</script>

</body>
</html>
