<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>المشاريع</title>
<style>
body{text-align:center;font-family:Arial;background:#f4f6f8}
.box{background:#fff;width:300px;margin:20px auto;padding:20px}
input{width:90%;padding:10px}
button{width:100%;padding:10px;background:#0d47a1;color:#fff}
</style>
</head>
<body>

<h3>المشاريع</h3>

<div class="box">
<h4>مشروع دبي</h4>
<input id="a1">
<button onclick="inv('a1')">استثمار</button>
</div>

<div class="box">
<h4>مشروع لندن</h4>
<input id="a2">
<button onclick="inv('a2')">استثمار</button>
</div>

<script>
let user=localStorage.getItem("currentUser");
let users=JSON.parse(localStorage.getItem("users"));

function inv(id){
let a=Number(document.getElementById(id).value);
if(a>users[user].balance)return alert("رصيد");

users[user].balance-=a;
users[user].transactions.push("استثمار "+a);

localStorage.setItem("users",JSON.stringify(users));
location="dashboard.html";
}
</script>

</body>
</html>
