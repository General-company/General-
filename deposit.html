<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إيداع</title>
<style>
body{text-align:center;font-family:Arial;background:#f4f6f8}
.box{background:#fff;width:320px;margin:60px auto;padding:20px}
input,select{width:90%;padding:10px;margin:5px}
button{width:100%;padding:10px;background:#0d47a1;color:#fff}
.wallet{background:#eee;padding:10px;margin:10px;font-size:12px;word-break:break-all}
</style>
</head>
<body>

<div class="box">
<h3>الإيداع</h3>

<select id="net" onchange="show()">
<option value="">اختر الشبكة</option>
<option value="trx">TRC20</option>
<option value="bsc">BEP20</option>
</select>

<div class="wallet" id="w">اختر شبكة</div>

<input id="a" type="number">

<button onclick="dep()">تسجيل الإيداع</button>
</div>

<script>
let user=localStorage.getItem("currentUser");
let users=JSON.parse(localStorage.getItem("users"));

const w={
trx:"TXsH5pzQFbP3RkW68jUuFahqa846z58x8o",
bsc:"0x0c6106c0fdec995a16c50f61ee2ca92550001b57"
};

function show(){
let n=document.getElementById("net").value;
document.getElementById("w").innerText=w[n]||"";
}

function dep(){
let a=Number(document.getElementById("a").value);
users[user].transactions.push("إيداع "+a);
localStorage.setItem("users",JSON.stringify(users));
location="dashboard.html";
}
</script>

</body>
</html>
