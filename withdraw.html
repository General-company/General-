<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>السحب</title>

<style>
body{font-family:Arial;direction:rtl;background:#f4f6f8;text-align:center;}
.box{background:white;width:300px;margin:80px auto;padding:20px;border-radius:10px;}
input{width:90%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#0d47a1;color:white;border:none;}
</style>
</head>

<body>

<div class="box">
<h2>السحب</h2>

<input id="amount" type="number">

<button onclick="wd()">سحب</button>
</div>

<script>
function wd(){
let a=Number(document.getElementById("amount").value);
let b=Number(localStorage.getItem("balance"))||0;

if(a>b){alert("رصيد غير كافي");return;}

b-=a;
localStorage.setItem("balance",b);

let t=JSON.parse(localStorage.getItem("transactions"))||[];
t.push("سحب - "+a);
localStorage.setItem("transactions",JSON.stringify(t));

window.location.href="dashboard.html";
}
</script>

</body>
</html>
