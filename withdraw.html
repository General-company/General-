<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سحب</title>
<style>
body{text-align:center;font-family:Arial;background:#f4f6f8}
.box{background:#fff;width:300px;margin:60px auto;padding:20px}
input{width:90%;padding:10px}
button{width:100%;padding:10px;background:#0d47a1;color:#fff}
</style>
</head>
<body>

<div class="box">
<h3>سحب</h3>
<input id="a" type="number">
<button onclick="wd()">سحب</button>
</div>

<script>
let user=localStorage.getItem("currentUser");
let users=JSON.parse(localStorage.getItem("users"));

function wd(){
let a=Number(document.getElementById("a").value);
if(a>users[user].balance)return alert("رصيد غير كافي");

users[user].balance-=a;
users[user].transactions.push("سحب "+a);

localStorage.setItem("users",JSON.stringify(users));
location="dashboard.html";
}
</script>

</body>
</html>
